services:

  # ── WA Backend — Groq API orqali Llama 4 Scout ──
  wa-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-backend
    ports:
      - "5000:5000"
    environment:
      - LLM_URL=https://api.groq.com/openai
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ConnectionStrings__Default=Data Source=/data/assistant.db
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - D:/WA-Data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
