services:

  # ── llama.cpp server (Ollama o'rniga, 20-40% tezroq) ──
  # Model: models/ papkasiga setup_model.sh orqali yuklang
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: wa-llm
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      --model /models/qwen2.5-7b-q4_k_m.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
      --threads 8
      --parallel 2
      --cont-batching
      --flash-attn
    restart: unless-stopped

  # ── WA Backend ──
  wa-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-backend
    ports:
      - "5000:5000"
    environment:
      - LLM_URL=http://llama-server:8080
      - ConnectionStrings__Default=Data Source=/data/assistant.db
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - wa_data:/data
    depends_on:
      - llama-server
    restart: unless-stopped

volumes:
  wa_data:
    name: wa-assistant-data
