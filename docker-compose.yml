services:

  # ── llama-cpp-python server — RTX 2060 GPU accelerated ──
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.llm
    container_name: wa-llm
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── WA Backend ──
  wa-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-backend
    ports:
      - "5000:5000"
    environment:
      - LLM_URL=http://llama-server:8080
      - ConnectionStrings__Default=Data Source=/data/assistant.db
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - wa_data:/data
    depends_on:
      - llama-server
    restart: unless-stopped

volumes:
  wa_data:
    name: wa-assistant-data
