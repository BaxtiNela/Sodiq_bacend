<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monaco Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
  #container { width: 100%; height: 100%; }
  .monaco-editor .margin { background: #1e1e2e !important; }
  /* AI tomonidan o'zgartirilgan qatorlar — yashil gutter chiziq */
  .edited-line-gutter {
    background: #a6e3a1;
    width: 3px !important;
    margin-left: 2px;
  }
  .edited-line-bg {
    background: rgba(166, 227, 161, 0.08);
  }
</style>
</head>
<body>
<div id="container"></div>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
require.config({
  paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' }
});

require(['vs/editor/editor.main'], function () {
  monaco.editor.defineTheme('catppuccin-mocha', {
    base: 'vs-dark',
    inherit: true,
    rules: [
      { token: 'comment', foreground: '6c7086', fontStyle: 'italic' },
      { token: 'keyword', foreground: 'cba6f7' },
      { token: 'string', foreground: 'a6e3a1' },
      { token: 'number', foreground: 'fab387' },
      { token: 'type', foreground: '89dceb' },
      { token: 'class', foreground: 'f9e2af' },
      { token: 'function', foreground: '89b4fa' },
      { token: 'variable', foreground: 'cdd6f4' },
      { token: 'operator', foreground: '89dceb' },
    ],
    colors: {
      'editor.background': '#1e1e2e',
      'editor.foreground': '#cdd6f4',
      'editor.lineHighlightBackground': '#2a2a3d',
      'editor.selectionBackground': '#45475a',
      'editor.inactiveSelectionBackground': '#313244',
      'editorLineNumber.foreground': '#45475a',
      'editorLineNumber.activeForeground': '#cdd6f4',
      'editorCursor.foreground': '#f5c2e7',
      'editorWhitespace.foreground': '#313244',
      'editorIndentGuide.background': '#313244',
      'editorIndentGuide.activeBackground': '#585b70',
      'editor.findMatchBackground': '#f9e2af40',
      'editor.findMatchHighlightBackground': '#f9e2af20',
      'editorWidget.background': '#181825',
      'editorWidget.border': '#313244',
      'editorSuggestWidget.background': '#181825',
      'editorSuggestWidget.border': '#313244',
      'editorSuggestWidget.selectedBackground': '#313244',
      'editorHoverWidget.background': '#181825',
      'editorHoverWidget.border': '#313244',
      'scrollbarSlider.background': '#45475a80',
      'scrollbarSlider.hoverBackground': '#585b70',
      'scrollbarSlider.activeBackground': '#6c7086',
      'minimap.background': '#181825',
    }
  });

  window.editor = monaco.editor.create(document.getElementById('container'), {
    value: '// Windows Assistant — Monaco Editor\n// Faylni ochish uchun File Tree dan ikki marta bosing\n',
    language: 'javascript',
    theme: 'catppuccin-mocha',
    fontSize: 13,
    fontFamily: "'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace",
    fontLigatures: true,
    lineNumbers: 'on',
    minimap: { enabled: true, scale: 1 },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    tabSize: 4,
    insertSpaces: true,
    wordWrap: 'off',
    renderWhitespace: 'selection',
    bracketPairColorization: { enabled: true },
    guides: { bracketPairs: true, indentation: true },
    smoothScrolling: true,
    cursorBlinking: 'smooth',
    cursorSmoothCaretAnimation: 'on',
    renderLineHighlight: 'all',
    occurrencesHighlight: true,
    selectionHighlight: true,
    suggest: {
      showMethods: true, showFunctions: true, showConstructors: true,
      showWords: true, insertMode: 'replace', filterGraceful: true,
    },
    quickSuggestions: { other: true, comments: false, strings: true },
    acceptSuggestionOnEnter: 'smart',
    tabCompletion: 'on',
    acceptSuggestionOnCommitCharacter: true,
    inlineSuggest: { enabled: true, showToolbar: 'onHover' },
    parameterHints: { enabled: true },
    hover: { enabled: true, delay: 300 },
    scrollbar: {
      vertical: 'auto',
      horizontal: 'auto',
      useShadows: false,
      verticalScrollbarSize: 8,
      horizontalScrollbarSize: 8,
    },
    padding: { top: 8, bottom: 8 },
  });

  // Expose API to C# via WebMessageReceived
  // Accepts either openFile(obj) or openFile(path, content, language)
  window.openFile = function(data, contentArg, languageArg) {
    var path, content, lang;
    if (data && typeof data === 'object') {
      path    = data.path     || '';
      content = data.content  || '';
      lang    = data.language || detectLanguage(path);
    } else {
      path    = data         || '';
      content = contentArg   || '';
      lang    = languageArg  || detectLanguage(path);
    }
    var uri = monaco.Uri.parse('file:///' + path.replace(/\\/g, '/'));
    var existing = monaco.editor.getModel(uri);
    if (existing) existing.dispose();
    var model = monaco.editor.createModel(content, lang, uri);
    window.editor.setModel(model);
    window.editor.focus();
  };

  window.getContent = function() {
    return window.editor.getValue();
  };

  window.setLanguage = function(lang) {
    monaco.editor.setModelLanguage(window.editor.getModel(), lang);
  };

  window.setContent = function(content) {
    window.editor.setValue(content);
  };

  // AI o'zgartirgan qatorlarni yashil gutter chiziq bilan belgilash
  window._editDecorations = [];
  window.highlightLines = function(lineNumbers) {
    var decorations = lineNumbers.map(function(line) {
      return {
        range: new monaco.Range(line, 1, line, 1),
        options: {
          isWholeLine: true,
          linesDecorationsClassName: 'edited-line-gutter',
          className: 'edited-line-bg'
        }
      };
    });
    window._editDecorations = window.editor.deltaDecorations(
      window._editDecorations, decorations);
    if (lineNumbers.length > 0)
      window.editor.revealLineInCenter(lineNumbers[0]);
  };

  window.clearHighlights = function() {
    window._editDecorations = window.editor.deltaDecorations(
      window._editDecorations, []);
  };

  function detectLanguage(path) {
    if (!path) return 'plaintext';
    var ext = path.split('.').pop().toLowerCase();
    var map = {
      // Web
      'js': 'javascript', 'mjs': 'javascript', 'cjs': 'javascript',
      'ts': 'typescript', 'mts': 'typescript', 'cts': 'typescript',
      'jsx': 'javascript', 'tsx': 'typescript',
      'html': 'html', 'htm': 'html', 'xhtml': 'html',
      'css': 'css', 'scss': 'scss', 'sass': 'scss', 'less': 'less',
      'vue': 'html', 'svelte': 'html',
      // .NET / JVM
      'cs': 'csharp', 'csx': 'csharp', 'vb': 'vb',
      'java': 'java', 'kt': 'kotlin', 'kts': 'kotlin', 'groovy': 'groovy',
      'scala': 'scala', 'fs': 'fsharp', 'fsx': 'fsharp',
      // Systems
      'c': 'c', 'h': 'c',
      'cpp': 'cpp', 'cc': 'cpp', 'cxx': 'cpp', 'hpp': 'cpp', 'hxx': 'cpp',
      'rs': 'rust', 'go': 'go', 'zig': 'plaintext',
      // Scripting
      'py': 'python', 'pyw': 'python', 'pyi': 'python',
      'rb': 'ruby', 'rake': 'ruby', 'gemspec': 'ruby',
      'php': 'php', 'php3': 'php', 'php4': 'php', 'php5': 'php', 'phtml': 'php',
      'lua': 'lua', 'pl': 'perl', 'pm': 'perl',
      'r': 'r', 'rmd': 'markdown',
      'swift': 'swift', 'dart': 'dart',
      // Shell
      'sh': 'shell', 'bash': 'shell', 'zsh': 'shell', 'fish': 'shell',
      'ps1': 'powershell', 'psm1': 'powershell', 'psd1': 'powershell',
      'bat': 'bat', 'cmd': 'bat',
      // Data / Config
      'json': 'json', 'jsonc': 'json', 'json5': 'json',
      'xml': 'xml', 'xaml': 'xml', 'svg': 'xml', 'plist': 'xml', 'csproj': 'xml',
      'yaml': 'yaml', 'yml': 'yaml',
      'toml': 'ini', 'ini': 'ini', 'cfg': 'ini', 'conf': 'ini', 'env': 'ini',
      'properties': 'ini',
      // Query / DB
      'sql': 'sql', 'mysql': 'sql', 'pgsql': 'sql',
      // Docs
      'md': 'markdown', 'markdown': 'markdown', 'mdx': 'markdown',
      'rst': 'plaintext', 'tex': 'plaintext',
      'txt': 'plaintext', 'log': 'plaintext', 'csv': 'plaintext', 'tsv': 'plaintext',
      // Build / DevOps
      'dockerfile': 'dockerfile', 'containerfile': 'dockerfile',
      'makefile': 'makefile', 'mk': 'makefile', 'cmake': 'plaintext',
      'tf': 'plaintext', 'hcl': 'plaintext',
      // Other
      'graphql': 'graphql', 'gql': 'graphql',
      'proto': 'protobuf',
      'ex': 'elixir', 'exs': 'elixir',
      'erl': 'erlang', 'hrl': 'erlang',
      'clj': 'clojure', 'cljs': 'clojure',
      'hs': 'haskell', 'lhs': 'haskell',
      'ml': 'plaintext', 'mli': 'plaintext',
      'nim': 'plaintext', 'cr': 'plaintext',
    };
    return map[ext] || 'plaintext';
  }

  // Notify C# when content changes
  window.editor.onDidChangeModelContent(function() {
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(JSON.stringify({
        type: 'contentChanged',
        isDirty: true
      }));
    }
  });

  // Notify C# when cursor position changes
  window.editor.onDidChangeCursorPosition(function(e) {
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(JSON.stringify({
        type: 'cursorChanged',
        line: e.position.lineNumber,
        column: e.position.column
      }));
    }
  });

  // Handle messages from C#
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener('message', function(e) {
      try {
        var msg = JSON.parse(e.data);
        if (msg.type === 'openFile') {
          window.openFile(msg.path, msg.content, msg.language);
        } else if (msg.type === 'setContent') {
          window.setContent(msg.content);
        } else if (msg.type === 'getContent') {
          window.chrome.webview.postMessage(JSON.stringify({
            type: 'content',
            value: window.getContent()
          }));
        }
      } catch(err) {}
    });
  }
});
</script>
</body>
</html>
